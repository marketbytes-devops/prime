version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: prime_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - prime_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./backend
    container_name: prime_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: shared-mysql
      DB_PORT: 3306
      REDIS_HOST: prime_redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://prime_redis:6379/0
      CELERY_RESULT_BACKEND: redis://prime_redis:6379/1
      DJANGO_SETTINGS_MODULE: backend.settings
    depends_on:
      - redis
    ports:
      - "6370:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    networks:
      - prime_network
      - shared-db-network

  celery-worker:
    build: ./backend
    container_name: prime_celery_worker
    restart: always
    env_file:
      - ./backend/.env
    environment:
      REDIS_HOST: prime_redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://prime_redis:6379/0
      CELERY_RESULT_BACKEND: redis://prime_redis:6379/1
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app
      - media_data:/app/media
    command: ["sh", "-c", "sleep 15 && celery -A backend worker --loglevel=info --concurrency=4"]
    networks:
      - prime_network
      - shared-db-network

  celery-beat:
    build: ./backend
    container_name: prime_celery_beat
    restart: always
    env_file:
      - ./backend/.env
    environment:
      REDIS_HOST: prime_redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://prime_redis:6379/0
      CELERY_RESULT_BACKEND: redis://prime_redis:6379/1
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app
      - media_data:/app/media
    command: ["sh", "-c", "sleep 20 && celery -A backend beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"]
    networks:
      - prime_network
      - shared-db-network

  cms:
    build: ./dashboard
    container_name: prime_frontend
    restart: always
    ports:
      - "6371:80"
    networks:
      - prime_network

networks:
  prime_network:
    driver: bridge
  shared-db-network:
    external: true

volumes:
  redis_data:
  media_data:
